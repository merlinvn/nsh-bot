name: neo-chat-platform-prod

x-common-env: &common-env
  POSTGRES_DB: ${POSTGRES_DB:-neochat}
  POSTGRES_USER: ${POSTGRES_USER:-neochat}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://neochat:changeme@postgres:5432/neochat}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  ZALO_APP_ID: ${ZALO_APP_ID:-}
  ZALO_APP_SECRET: ${ZALO_APP_SECRET:-}
  ZALO_ACCESS_TOKEN: ${ZALO_ACCESS_TOKEN:-}
  ZALO_WEBHOOK_SECRET: ${ZALO_WEBHOOK_SECRET:-}
  ZALO_OA_ID: ${ZALO_OA_ID:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
  LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://localhost:11434/v1}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
  OPENAI_MODEL: ${OPENAI_MODEL:-llama3.2}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-*}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
  CONTEXT_WINDOW_SIZE: ${CONTEXT_WINDOW_SIZE:-10}
  MAX_TOOL_CALLS: ${MAX_TOOL_CALLS:-2}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-15}

x-worker-env: &worker-env
  <<: *common-env
  WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-8080}

services:
  postgres:
    image: postgres:15-alpine
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neochat}
      POSTGRES_USER: ${POSTGRES_USER:-neochat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neochat} -d ${POSTGRES_DB:-neochat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      <<: *common-env
      LOG_LEVEL: WARNING
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  conversation-worker:
    build:
      context: .
      dockerfile: Dockerfile.conversation-worker
    command: python -m app.workers.conversation.main
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8080"
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  outbound-worker:
    build:
      context: .
      dockerfile: Dockerfile.outbound-worker
    command: python -m app.workers.outbound.main
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8081"
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  llm-worker:
    build:
      context: .
      dockerfile: Dockerfile.llm-worker
    command: python -m app.workers.llm.main
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8082"
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
