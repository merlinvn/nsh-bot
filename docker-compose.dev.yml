name: neo-chat-platform-dev

x-common-env: &common-env
  POSTGRES_DB: ${POSTGRES_DB:-neochat}
  POSTGRES_USER: ${POSTGRES_USER:-neochat}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://neochat:changeme@postgres:5432/neochat}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  ZALO_APP_ID: ${ZALO_APP_ID:-}
  ZALO_APP_SECRET: ${ZALO_APP_SECRET:-}
  ZALO_WEBHOOK_SECRET: ${ZALO_WEBHOOK_SECRET:-}
  ZALO_OA_ID: ${ZALO_OA_ID:-}
  ZALO_CALLBACK_URL: ${ZALO_CALLBACK_URL:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
  LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://localhost:11434/v1}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
  OPENAI_MODEL: ${OPENAI_MODEL:-llama3.2}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
  CONTEXT_WINDOW_SIZE: ${CONTEXT_WINDOW_SIZE:-10}
  MAX_TOOL_CALLS: ${MAX_TOOL_CALLS:-2}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-15}
  ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-86400}
  ADMIN_BCRYPT_ROUNDS: ${ADMIN_BCRYPT_ROUNDS:-12}
  ADMIN_MAX_LOGIN_ATTEMPTS: ${ADMIN_MAX_LOGIN_ATTEMPTS:-5}
  ADMIN_LOCKOUT_MINUTES: ${ADMIN_LOCKOUT_MINUTES:-15}
  ADMIN_LOGIN_RATE_LIMIT_PER_MINUTE: ${ADMIN_LOGIN_RATE_LIMIT_PER_MINUTE:-10}

x-worker-env: &worker-env
  <<: *common-env
  WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-8080}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neochat}
      POSTGRES_USER: ${POSTGRES_USER:-neochat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - neochat_dev_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neochat} -d ${POSTGRES_DB:-neochat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - neochat_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - neochat_dev_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      <<: *common-env
      LOG_LEVEL: DEBUG
    volumes:
      - ./app:/app/app:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  conversation-worker:
    build:
      context: .
      dockerfile: Dockerfile.conversation-worker
    command: python -m app.workers.conversation.main
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8080"
    volumes:
      - ./app:/app/app:rw
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  outbound-worker:
    build:
      context: .
      dockerfile: Dockerfile.outbound-worker
    command: python -m app.workers.outbound.main
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8081"
    volumes:
      - ./app:/app/app:rw
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  llm-worker:
    build:
      context: .
      dockerfile: Dockerfile.llm-worker
    command: python -m app.workers.llm.main
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      <<: *worker-env
      WORKER_METRICS_PORT: "8082"
    volumes:
      - ./app:/app/app:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neochat_dev_db:
  neochat_dev_redis:
  neochat_dev_rabbitmq:
